serenity {
    take.screenshots = FOR_EACH_ACTION
    reports.show.step.details = true
    project.name = "PeriBook QA — Pruebas de Aceptación"
}

headless.mode = false

# Entornos — apuntan al api-gateway (único punto de entrada)
environments {
    default {
        api.base.url = "http://localhost:8080"
        webdriver.base.url = "http://localhost:4200"
    }
    docker {
        api.base.url = "http://api-gateway:8080"
        webdriver.base.url = "http://frontend:80"
    }
}

webdriver {
    driver = chrome
    wait.for.timeout = 10000
}

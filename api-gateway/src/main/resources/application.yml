server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ORIGINS:http://localhost:4200}
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      # Las rutas se definen programáticamente en GatewayRoutes.java

jwt:
  issuer: peribook-auth-service
  expiration: PT1H
  rsa:
    public-key-path: keys/jwt-public.pem
    private-key-path: keys/jwt-private.pem

logging:
  level:
    com.peribook: DEBUG
    org.springframework.cloud.gateway: DEBUG

server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ORIGINS:http://localhost:4200}
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      # Las rutas se definen programáticamente en GatewayRoutes.java

jwt:
  issuer: peribook-auth-service
  expiration: PT1H
  rsa:
    public-key-path: keys/jwt-public.pem
    private-key-path: keys/jwt-private.pem

springdoc:
  swagger-ui:
    path: /docs
    urls:
      - name: auth-service
        url: /v3/api-docs/auth-service
      - name: user-service
        url: /v3/api-docs/user-service
      - name: post-service
        url: /v3/api-docs/post-service
      - name: like-service
        url: /v3/api-docs/like-service
      - name: bff-web
        url: /v3/api-docs/bff-web
  api-docs:
    groups:
      enabled: true

logging:
  level:
    com.peribook: DEBUG
    org.springframework.cloud.gateway: DEBUG

server:
  port: 8086

spring:
  application:
    name: bff-web
  # Sin datasource: bff-web es stateless y sin base de datos propia (ADR 0003)

jwt:
  issuer: peribook-auth-service
  rsa:
    public-key-path: keys/jwt-public.pem
    private-key-path: keys/jwt-private.pem

springdoc:
  api-docs:
    path: /v3/api-docs

# Resilience4j — Circuit Breaker para like-service
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
    instances:
      likeService:
        base-config: default
        wait-duration-in-open-state: 15s
  timelimiter:
    configs:
      default:
        timeout-duration: 3s

logging:
  level:
    com.peribook: DEBUG

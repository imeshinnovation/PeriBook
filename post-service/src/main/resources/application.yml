server:
  port: 8083

spring:
  application:
    name: post-service
  datasource:
    url: jdbc:postgresql://${POST_DB_HOST:localhost}:${POST_DB_PORT:5432}/postdb
    username: ${POST_DB_USER:postuser}
    password: ${POST_DB_PASSWORD:postpass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

springdoc:
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.peribook: DEBUG

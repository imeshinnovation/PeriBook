server:
  port: 8084

spring:
  application:
    name: like-service
  datasource:
    url: jdbc:postgresql://${LIKE_DB_HOST:localhost}:${LIKE_DB_PORT:5432}/likedb
    username: ${LIKE_DB_USER:likeuser}
    password: ${LIKE_DB_PASSWORD:likepass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

springdoc:
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.peribook: DEBUG

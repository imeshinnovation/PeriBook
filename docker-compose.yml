# ============================================================================
# PeriBook — Orquestador raíz de desarrollo local
#
# Usa `include:` (Docker Compose >= 2.20) para componer el docker-compose.yml
# de cada microservicio. Cada servicio es 100% autónomo (docker compose up
# dentro de su directorio funciona sin este archivo).
#
# Uso:
#   docker compose up --build          # Levantar todo
#   docker compose up auth-service     # Levantar solo un servicio + sus depends_on
#   docker compose down -v             # Tirar todo (incluye volúmenes)
#
# Requisito: Docker Compose >= 2.20 (incluido en Docker Desktop y docker-ce actual)
# ============================================================================

name: peribook

networks:
  peribook-net:
    driver: bridge

# ── Infraestructura compartida ────────────────────────────────────────────────
services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: peribook-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - peribook-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Microservicios + frontend ─────────────────────────────────────────────────
# Cada servicio se incluye desde su propio docker-compose.yml.
# La red externa peribook-net se define arriba y se comparte con todos.

include:
  - api-gateway/docker-compose.yml
  - bff-web/docker-compose.yml
  - auth-service/docker-compose.yml
  - user-service/docker-compose.yml
  - post-service/docker-compose.yml
  - like-service/docker-compose.yml
  - realtime-service/docker-compose.yml
  - frontend/docker-compose.yml

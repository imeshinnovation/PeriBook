# Snyk — Escaneo de vulnerabilidades en dependencias
# Requiere: SNYK_TOKEN configurado en Secrets de GitHub

name: Snyk Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
  workflow_call:

jobs:
  snyk-maven:
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - post-service
          - like-service
          - api-gateway
          - bff-web
          - realtime-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk on ${{ matrix.service }}
        uses: snyk/actions/maven@0.4.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=${{ matrix.service }}/pom.xml --severity-threshold=low --policy-path=.

  snyk-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install --prefix frontend

      - name: Run Snyk on frontend
        uses: snyk/actions/node@0.4.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=frontend/package.json --severity-threshold=low --policy-path=.

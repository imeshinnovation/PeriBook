# CI — Build & Test todos los microservicios
# Se ejecuta en cada push y PR a main

name: CI Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  # ── Backend services (Java 21 + Maven) ──────────────
  backend:
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - post-service
          - like-service
          - api-gateway
          - bff-web
          - realtime-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Sin cache: maven — cada servicio tiene su pom.xml en subdirectorio

      - name: Build & Test ${{ matrix.service }}
        run: mvn -f ${{ matrix.service }}/pom.xml clean test -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/

  # ── Frontend (Angular) ──────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --prefix frontend --legacy-peer-deps

      - name: Build
        run: npm run build --prefix frontend

  # ── QA-BDD (Gradle + Serenity) — solo compila, no ejecuta tests ──
  qa-bdd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile QA project
        run: gradle -p qa-bdd compileJava

  # ── Consolidar ──────────────────────────────────────
  ci-status:
    needs: [backend, frontend, qa-bdd]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        env:
          BACKEND: ${{ needs.backend.result }}
          FRONTEND: ${{ needs.frontend.result }}
          QA: ${{ needs.qa-bdd.result }}
        run: |
          echo "backend=$BACKEND frontend=$FRONTEND qa=$QA"
          if [ "$BACKEND" != "success" ] || [ "$FRONTEND" != "success" ] || [ "$QA" != "success" ]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ CI passed"

# CI — Build & Test todos los microservicios
# Se ejecuta en cada push y PR a main

name: CI Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend services (Java 21 + Maven) ──────────────
  backend:
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - post-service
          - like-service
          - api-gateway
          - bff-web
          - realtime-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn clean test -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/

  # ── Frontend (Angular) ──────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── QA-BDD (Gradle + Serenity) ──────────────────────
  qa-bdd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build QA project
        working-directory: qa-bdd
        run: ./gradlew build -x test

  # ── Consolidar resultados ───────────────────────────
  ci-status:
    needs: [backend, frontend, qa-bdd]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ CI passed"

# Trivy — Escaneo de vulnerabilidades en imágenes Docker

name: Trivy Container Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
  workflow_call:

jobs:
  trivy-scan:
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - post-service
          - like-service
          - api-gateway
          - bff-web
          - realtime-service
          - frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for ${{ matrix.service }}
        run: docker build -t peribook/${{ matrix.service }}:ci ${{ matrix.service }}/

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8  # master
        with:
          image-ref: peribook/${{ matrix.service }}:ci
          format: 'sarif'
          output: trivy-results-${{ matrix.service }}.sarif
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

# Pipeline completo — Build → Test → Snyk → Docker → Trivy
# Se ejecuta manualmente (workflow_dispatch) o en push a main

name: Full CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: peribook

jobs:
  # ── Build & Test ────────────────────────────────────
  build:
    uses: ./.github/workflows/ci-build.yml

  # ── Security Scans ──────────────────────────────────
  security:
    needs: build
    uses: ./.github/workflows/snyk-security.yml
    secrets: inherit

  # ── Build & Push Docker images ──────────────────────
  docker:
    needs: security
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - post-service
          - like-service
          - api-gateway
          - bff-web
          - realtime-service
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}

  # ── Trivy Scan ──────────────────────────────────────
  trivy:
    needs: docker
    uses: ./.github/workflows/trivy-scan.yml

  # ── Notify ───────────────────────────────────────────
  notify:
    needs: trivy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Pipeline status
        env:
          TRIVY: ${{ needs.trivy.result }}
        run: |
          if [ "$TRIVY" = "success" ]; then
            echo "✅ Pipeline completo"
          else
            echo "⚠️  Pipeline con advertencias (trivy=$TRIVY)"
          fi
